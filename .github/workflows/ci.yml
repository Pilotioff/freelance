name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: freelance-estimator-backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: freelance_estimator
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: freelance-estimator-backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/freelance_estimator
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/freelance_estimator
          MONGODB_URI: mongodb://localhost:27017/freelance_estimator
          JWT_SECRET: test_secret_key_for_ci
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: freelance-estimator-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: freelance-estimator-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000/api
  sonarcloud:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  deploy:
    runs-on: self-hosted
    needs: [backend, frontend, sonarcloud]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Levantar bases de datos locales
        run: docker compose up -d postgres mongodb
      - name: Desplegar backend (pm2, puerto 3001)
        working-directory: freelance-estimator-backend
        env:
          DATABASE_URL: postgresql://postgres:12345@localhost:5432/freelance_estimator
          MONGODB_URI: mongodb://localhost:27017/freelance_estimator
          JWT_SECRET: deploy_local_secret_key
          PORT: 3001
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run build
          pm2 restart freelance-backend --update-env || pm2 start dist/src/main.js --name freelance-backend --update-env
      - name: Construir y desplegar frontend (pm2, puerto 4173)
        working-directory: freelance-estimator-frontend
        env:
          VITE_API_URL: http://localhost:3001/api
        run: |
          npm ci
          npm run build
          pm2 restart freelance-frontend || pm2 serve dist 4173 --name freelance-frontend --spa
      - name: Guardar lista de procesos pm2
        run: pm2 save
